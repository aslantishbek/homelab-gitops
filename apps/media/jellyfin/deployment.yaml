apiVersion: apps/v1
kind: Deployment
metadata:
  name: jellyfin
  namespace: media
spec:
  replicas: 1
  selector:
    matchLabels:
      app: jellyfin
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: jellyfin
    spec:
      containers:
        - name: jellyfin
          image: jellyfin/jellyfin:latest
          ports:
            - containerPort: 8096
              name: http
          volumeMounts:
            - name: config
              mountPath: /config
            - name: media
              mountPath: /media
              readOnly: true
            - name: dri
              mountPath: /dev/dri
          resources:
            requests:
              memory: 512Mi
            limits:
              memory: 4Gi
          securityContext:
            privileged: false
      securityContext:
        supplementalGroups:
          - 44
          - 993
      volumes:
        - name: config
          persistentVolumeClaim:
            claimName: jellyfin-config
        - name: media
          hostPath:
            path: /home/media
            type: Directory
        - name: dri
          hostPath:
            path: /dev/dri
            type: Directory
