apiVersion: v1
kind: ServiceAccount
metadata:
  name: vaultwarden-backup
  namespace: apps
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: vaultwarden-backup
  namespace: apps
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list"]
  - apiGroups: [""]
    resources: ["pods/exec"]
    verbs: ["create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: vaultwarden-backup
  namespace: apps
subjects:
  - kind: ServiceAccount
    name: vaultwarden-backup
    namespace: apps
roleRef:
  kind: Role
  name: vaultwarden-backup
  apiGroup: rbac.authorization.k8s.io
