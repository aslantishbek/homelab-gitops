apiVersion: v1
kind: ConfigMap
metadata:
  name: presentation-html
  namespace: apps
data:
  index.html: |
    <!DOCTYPE html>
    <html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Aslan Tishbek — DevOps & Infrastructure Engineer</title>
        <script src="https://cdn.tailwindcss.com"></script>
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" crossorigin="anonymous">
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
        <style>
            * { scroll-behavior: smooth; }
            body {
                background-color: #060d1a;
                color: #f1f5f9;
                font-family: 'Inter', sans-serif;
            }
            .glass {
                background: rgba(15, 23, 42, 0.6);
                backdrop-filter: blur(16px);
                border: 1px solid rgba(51, 65, 85, 0.4);
            }
            .glass-card {
                background: rgba(15, 23, 42, 0.7);
                backdrop-filter: blur(12px);
                border: 1px solid rgba(51, 65, 85, 0.35);
                transition: all 0.3s ease;
            }
            .glass-card:hover {
                border-color: rgba(59, 130, 246, 0.5);
                transform: translateY(-4px);
                box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4), 0 0 30px rgba(59, 130, 246, 0.08);
            }
            .gradient-text {
                background: linear-gradient(135deg, #60a5fa, #34d399, #a78bfa);
                -webkit-background-clip: text;
                -webkit-text-fill-color: transparent;
                background-clip: text;
            }
            .hero-bg {
                background:
                    radial-gradient(ellipse 80% 50% at 20% 20%, rgba(59, 130, 246, 0.08) 0%, transparent 60%),
                    radial-gradient(ellipse 60% 40% at 80% 80%, rgba(167, 139, 250, 0.07) 0%, transparent 55%),
                    radial-gradient(ellipse 50% 60% at 50% 50%, rgba(52, 211, 153, 0.04) 0%, transparent 70%);
            }
            .dot-grid {
                background-image: radial-gradient(rgba(148, 163, 184, 0.07) 1px, transparent 1px);
                background-size: 28px 28px;
            }
            .skill-badge {
                background: rgba(15, 23, 42, 0.8);
                border: 1px solid rgba(51, 65, 85, 0.5);
                transition: all 0.25s ease;
            }
            .skill-badge:hover {
                border-color: rgba(59, 130, 246, 0.6);
                background: rgba(59, 130, 246, 0.08);
            }
            .section-label {
                font-family: 'JetBrains Mono', monospace;
                color: #60a5fa;
                font-size: 0.75rem;
                letter-spacing: 0.15em;
                text-transform: uppercase;
            }
            .nav-link {
                color: #94a3b8;
                transition: color 0.2s;
                font-size: 0.875rem;
            }
            .nav-link:hover { color: #f1f5f9; }
            .tag {
                font-family: 'JetBrains Mono', monospace;
                font-size: 0.7rem;
                padding: 2px 8px;
                border-radius: 4px;
                background: rgba(59, 130, 246, 0.1);
                border: 1px solid rgba(59, 130, 246, 0.25);
                color: #93c5fd;
            }
            .tag.green {
                background: rgba(52, 211, 153, 0.1);
                border-color: rgba(52, 211, 153, 0.25);
                color: #6ee7b7;
            }
            .tag.purple {
                background: rgba(167, 139, 250, 0.1);
                border-color: rgba(167, 139, 250, 0.25);
                color: #c4b5fd;
            }
            .tag.amber {
                background: rgba(251, 191, 36, 0.1);
                border-color: rgba(251, 191, 36, 0.25);
                color: #fcd34d;
            }
            .tag.rose {
                background: rgba(251, 113, 133, 0.1);
                border-color: rgba(251, 113, 133, 0.25);
                color: #fda4af;
            }
            .timeline-item::before {
                content: '';
                position: absolute;
                left: -1px;
                top: 20px;
                bottom: -32px;
                width: 1px;
                background: linear-gradient(to bottom, rgba(59, 130, 246, 0.5), transparent);
            }
            .timeline-item:last-child::before { display: none; }
            .avatar-ring {
                background: linear-gradient(135deg, #3b82f6, #8b5cf6, #34d399);
                padding: 3px;
                border-radius: 50%;
            }
            .avatar-inner {
                background: #0f172a;
                border-radius: 50%;
                width: 100%;
                height: 100%;
                display: flex;
                align-items: center;
                justify-content: center;
            }
            .btn-primary {
                background: linear-gradient(135deg, #3b82f6, #6366f1);
                transition: all 0.3s ease;
                position: relative;
                overflow: hidden;
            }
            .btn-primary::before {
                content: '';
                position: absolute;
                top: 0; left: -100%;
                width: 100%; height: 100%;
                background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent);
                transition: left 0.5s;
            }
            .btn-primary:hover::before { left: 100%; }
            .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 10px 25px rgba(59, 130, 246, 0.35); }
            .stat-num {
                font-family: 'JetBrains Mono', monospace;
                font-size: 2rem;
                font-weight: 700;
            }
            @keyframes float {
                0%, 100% { transform: translateY(0); }
                50% { transform: translateY(-8px); }
            }
            .float-anim { animation: float 6s ease-in-out infinite; }
            .float-anim-slow { animation: float 9s ease-in-out infinite; }
            .progress-bar {
                height: 4px;
                border-radius: 2px;
                background: rgba(51, 65, 85, 0.6);
                overflow: hidden;
            }
            .progress-fill {
                height: 100%;
                border-radius: 2px;
                background: linear-gradient(90deg, #3b82f6, #34d399);
            }
            #mobile-menu { display: none; }
            @media (max-width: 768px) {
                #nav-links { display: none; }
            }
            .scroll-top {
                position: fixed;
                bottom: 2rem;
                right: 2rem;
                z-index: 99;
                width: 44px;
                height: 44px;
                border-radius: 10px;
                background: rgba(59, 130, 246, 0.15);
                border: 1px solid rgba(59, 130, 246, 0.3);
                color: #60a5fa;
                display: flex;
                align-items: center;
                justify-content: center;
                opacity: 0;
                pointer-events: none;
                transition: all 0.3s ease;
                cursor: pointer;
            }
            .scroll-top.visible {
                opacity: 1;
                pointer-events: auto;
            }
            .scroll-top:hover {
                background: rgba(59, 130, 246, 0.3);
                transform: translateY(-2px);
            }
        </style>
    </head>
    <body class="dot-grid">
    
        <!-- Scroll to top -->
        <button id="scrollTop" class="scroll-top" aria-label="Scroll to top" onclick="window.scrollTo({top:0,behavior:'smooth'})">
            <i class="fa-solid fa-arrow-up text-sm"></i>
        </button>
        <script>
            window.addEventListener('scroll', () => {
                const btn = document.getElementById('scrollTop');
                btn.classList.toggle('visible', window.scrollY > 400);
            });
        </script>
    
        <!-- Nav -->
        <nav class="fixed top-0 left-0 right-0 z-50 glass border-b border-slate-700/30" aria-label="Main navigation">
            <div class="max-w-6xl mx-auto px-6 py-4 flex items-center justify-between">
                <a href="#hero" class="font-mono text-sm text-blue-400 font-semibold tracking-wider" aria-label="Home">AT<span class="text-slate-500">://</span>portfolio</a>
                <div id="nav-links" class="hidden md:flex items-center gap-8">
                    <a href="#hero" class="nav-link">Home</a>
                    <a href="#about" class="nav-link">About</a>
                    <a href="#skills" class="nav-link">Skills</a>
                    <a href="#homelab" class="nav-link">Projects</a>
                    <a href="#goals" class="nav-link">Goals</a>
                    <a href="#contact" class="nav-link">Contact</a>
                </div>
                <a href="mailto:tishbekaslan@gmail.com" class="btn-primary text-white text-sm font-medium px-4 py-2 rounded-lg hidden md:inline-flex items-center gap-2" aria-label="Send email to hire">
                    <i class="fa-solid fa-envelope text-xs" aria-hidden="true"></i> Hire Me
                </a>
            </div>
        </nav>
    
        <main id="main-content">
        <!-- Hero -->
        <section id="hero" class="hero-bg min-h-screen flex items-center pt-20">
            <div class="max-w-6xl mx-auto px-6 py-24 w-full">
                <div class="flex flex-col lg:flex-row items-center gap-16">
                    <!-- Text -->
                    <div class="flex-1 space-y-8">
                        <div>
                            <span class="section-label">// available for opportunities</span>
                            <h1 class="text-5xl lg:text-6xl font-extrabold mt-3 leading-tight">
                                Hi, I'm <span class="gradient-text">Aslan Tishbek</span>
                            </h1>
                            <h2 class="text-2xl lg:text-3xl font-semibold text-slate-300 mt-3">
                                DevOps & Infrastructure Engineer
                            </h2>
                        </div>
                        <p class="text-slate-400 text-lg leading-relaxed max-w-xl">
                            I build and automate cloud-native infrastructure using Kubernetes, GitOps, and IaC. I run a fully declarative bare-metal homelab with local AI workloads — proving production-grade skills at home.
                        </p>
                        <div class="flex flex-wrap items-center gap-4">
                            <a href="#homelab" class="btn-primary text-white font-semibold px-6 py-3 rounded-xl flex items-center gap-2">
                                <i class="fa-solid fa-server text-sm"></i> View Homelab
                            </a>
                            <a href="#contact" class="glass text-slate-300 font-semibold px-6 py-3 rounded-xl flex items-center gap-2 hover:border-blue-500/50 transition-all">
                                <i class="fa-solid fa-envelope text-sm"></i> Get in Touch
                            </a>
                        </div>
                        <!-- Social links -->
                        <div class="flex items-center gap-4 pt-2">
                            <a href="https://linkedin.com/in/aslantishbek" target="_blank" class="text-slate-500 hover:text-blue-400 transition-colors text-xl" aria-label="LinkedIn">
                                <i class="fa-brands fa-linkedin"></i>
                            </a>
                            <a href="mailto:tishbekaslan@gmail.com" class="text-slate-500 hover:text-emerald-400 transition-colors text-xl" aria-label="Email">
                                <i class="fa-solid fa-envelope"></i>
                            </a>
                        </div>
                    </div>
                    <!-- Avatar + Stats -->
                    <div class="flex flex-col items-center gap-8">
                        <div class="avatar-ring w-48 h-48 float-anim">
                            <div class="avatar-inner w-full h-full" style="padding:4px;">
                                <img src="data:image/jpeg;base64," alt="Aslan Tishbek" class="w-full h-full rounded-full object-cover">
                            </div>
                        </div>
                        <!-- Quick stats -->
                        <div class="grid grid-cols-3 gap-4 text-center">
                            <div class="glass p-4 rounded-xl">
                                <div class="stat-num text-blue-400">K3s</div>
                                <div class="text-xs text-slate-500 mt-1">Kubernetes</div>
                            </div>
                            <div class="glass p-4 rounded-xl">
                                <div class="stat-num text-emerald-400">IaC</div>
                                <div class="text-xs text-slate-500 mt-1">100% Declarative</div>
                            </div>
                            <div class="glass p-4 rounded-xl">
                                <div class="stat-num text-purple-400">AI</div>
                                <div class="text-xs text-slate-500 mt-1">On-Prem LLMs</div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    
        <!-- About -->
        <section id="about" class="py-24">
            <div class="max-w-6xl mx-auto px-6">
                <div class="text-center mb-16">
                    <span class="section-label">// who I am</span>
                    <h2 class="text-4xl font-bold mt-2">About Me</h2>
                </div>
                <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
                    <div class="lg:col-span-2 glass-card p-8 rounded-2xl space-y-5">
                        <p class="text-slate-300 leading-relaxed text-lg">
                            I'm a self-driven infrastructure engineer passionate about building reliable, automated, and observable systems. My homelab is my proving ground — it runs the same tools used at scale in production: FluxCD, Terraform, Prometheus, and external-secrets, all on bare metal.
                        </p>
                        <p class="text-slate-400 leading-relaxed">
                            Beyond infrastructure, I'm deeply interested in on-premise AI — running LLMs and diffusion models locally with full control over the stack. I believe the best engineers understand the entire system from silicon to service.
                        </p>
                        <p class="text-slate-400 leading-relaxed">
                            Certified <span class="text-emerald-400 font-medium">CKAD</span> and <span class="text-blue-400 font-medium">HashiCorp Terraform Associate (003/004)</span>. Currently targeting <span class="text-amber-400 font-medium">AWS Solutions Architect</span> as the next milestone.
                        </p>
                        <div class="flex flex-wrap gap-2 pt-2">
                            <span class="tag">GitOps</span>
                            <span class="tag green">Kubernetes</span>
                            <span class="tag purple">Local AI</span>
                            <span class="tag amber">Terraform</span>
                            <span class="tag rose">Observability</span>
                            <span class="tag">Bare-Metal</span>
                        </div>
                    </div>
                    <div class="space-y-4">
                        <div class="glass-card p-6 rounded-2xl">
                            <div class="flex items-center gap-3 mb-4">
                                <i class="fa-solid fa-server text-blue-400 text-lg"></i>
                                <h3 class="font-semibold text-white">Homelab Specs</h3>
                            </div>
                            <ul class="space-y-2 text-sm text-slate-400">
                                <li class="flex justify-between"><span>CPU</span><span class="text-slate-200 font-mono text-xs">Ryzen 7 5800X3D</span></li>
                                <li class="flex justify-between"><span>GPU</span><span class="text-slate-200 font-mono text-xs">RX 7900 XTX 24GB</span></li>
                                <li class="flex justify-between"><span>RAM</span><span class="text-slate-200 font-mono text-xs">48GB DDR4</span></li>
                                <li class="flex justify-between"><span>Storage</span><span class="text-slate-200 font-mono text-xs">2× 2TB NVMe</span></li>
                            </ul>
                        </div>
                        <div class="glass-card p-6 rounded-2xl">
                            <div class="flex items-center gap-3 mb-4">
                                <i class="fa-solid fa-location-dot text-emerald-400 text-lg"></i>
                                <h3 class="font-semibold text-white">Quick Info</h3>
                            </div>
                            <ul class="space-y-2 text-sm text-slate-400">
                                <li class="flex items-center gap-2">
                                    <i class="fa-solid fa-envelope text-xs text-blue-400 w-4"></i>
                                    <a href="mailto:tishbekaslan@gmail.com" class="hover:text-white transition-colors">tishbekaslan@gmail.com</a>
                                </li>
                                <li class="flex items-center gap-2">
                                    <i class="fa-brands fa-github text-xs text-slate-300 w-4"></i>
                                    <span class="text-slate-400">GitHub</span>
                                </li>
                                <li class="flex items-center gap-2">
                                    <i class="fa-brands fa-linkedin text-xs text-blue-400 w-4"></i>
                                    <a href="https://linkedin.com/in/aslantishbek" target="_blank" class="hover:text-white transition-colors">linkedin.com/in/aslantishbek</a>
                                </li>
                                <li class="flex items-center gap-2">
                                    <i class="fa-solid fa-globe text-xs text-emerald-400 w-4"></i>
                                    <span>a-tishbek.info</span>
                                </li>
                            </ul>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    
        <!-- Skills -->
        <section id="skills" class="py-24 bg-gradient-to-b from-transparent to-slate-900/20">
            <div class="max-w-6xl mx-auto px-6">
                <div class="text-center mb-16">
                    <span class="section-label">// what I work with</span>
                    <h2 class="text-4xl font-bold mt-2">Technical Skills</h2>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
    
                    <!-- Container & Orchestration -->
                    <div class="glass-card p-6 rounded-2xl">
                        <div class="flex items-center gap-3 mb-5">
                            <div class="w-10 h-10 rounded-lg bg-blue-500/15 flex items-center justify-center">
                                <i class="fa-solid fa-dharmachakra text-blue-400"></i>
                            </div>
                            <h3 class="font-semibold text-white">Container & Orchestration</h3>
                        </div>
                        <div class="space-y-3">
                            <div>
                                <div class="flex justify-between text-sm mb-1"><span class="text-slate-300">Kubernetes / K3s</span><span class="text-slate-500 font-mono text-xs">Advanced</span></div>
                                <div class="progress-bar"><div class="progress-fill" style="width:88%"></div></div>
                            </div>
                            <div>
                                <div class="flex justify-between text-sm mb-1"><span class="text-slate-300">Docker / Compose</span><span class="text-slate-500 font-mono text-xs">Advanced</span></div>
                                <div class="progress-bar"><div class="progress-fill" style="width:90%"></div></div>
                            </div>
                            <div>
                                <div class="flex justify-between text-sm mb-1"><span class="text-slate-300">Helm</span><span class="text-slate-500 font-mono text-xs">Proficient</span></div>
                                <div class="progress-bar"><div class="progress-fill" style="width:78%"></div></div>
                            </div>
                            <div>
                                <div class="flex justify-between text-sm mb-1"><span class="text-slate-300">Kustomize</span><span class="text-slate-500 font-mono text-xs">Proficient</span></div>
                                <div class="progress-bar"><div class="progress-fill" style="width:80%"></div></div>
                            </div>
                        </div>
                    </div>
    
                    <!-- GitOps & IaC -->
                    <div class="glass-card p-6 rounded-2xl">
                        <div class="flex items-center gap-3 mb-5">
                            <div class="w-10 h-10 rounded-lg bg-emerald-500/15 flex items-center justify-center">
                                <i class="fa-solid fa-code-merge text-emerald-400"></i>
                            </div>
                            <h3 class="font-semibold text-white">GitOps & IaC</h3>
                        </div>
                        <div class="space-y-3">
                            <div>
                                <div class="flex justify-between text-sm mb-1"><span class="text-slate-300">FluxCD</span><span class="text-slate-500 font-mono text-xs">Advanced</span></div>
                                <div class="progress-bar"><div class="progress-fill" style="width:85%"></div></div>
                            </div>
                            <div>
                                <div class="flex justify-between text-sm mb-1"><span class="text-slate-300">Terraform</span><span class="text-slate-500 font-mono text-xs">Proficient</span></div>
                                <div class="progress-bar"><div class="progress-fill" style="width:78%"></div></div>
                            </div>
                            <div>
                                <div class="flex justify-between text-sm mb-1"><span class="text-slate-300">Ansible</span><span class="text-slate-500 font-mono text-xs">Proficient</span></div>
                                <div class="progress-bar"><div class="progress-fill" style="width:75%"></div></div>
                            </div>
                            <div>
                                <div class="flex justify-between text-sm mb-1"><span class="text-slate-300">Git / GitHub Actions</span><span class="text-slate-500 font-mono text-xs">Advanced</span></div>
                                <div class="progress-bar"><div class="progress-fill" style="width:88%"></div></div>
                            </div>
                        </div>
                    </div>
    
                    <!-- Cloud & Networking -->
                    <div class="glass-card p-6 rounded-2xl">
                        <div class="flex items-center gap-3 mb-5">
                            <div class="w-10 h-10 rounded-lg bg-purple-500/15 flex items-center justify-center">
                                <i class="fa-solid fa-cloud text-purple-400"></i>
                            </div>
                            <h3 class="font-semibold text-white">Cloud & Networking</h3>
                        </div>
                        <div class="space-y-3">
                            <div>
                                <div class="flex justify-between text-sm mb-1"><span class="text-slate-300">AWS (Route53, S3, IAM)</span><span class="text-slate-500 font-mono text-xs">Proficient</span></div>
                                <div class="progress-bar"><div class="progress-fill" style="width:72%"></div></div>
                            </div>
                            <div>
                                <div class="flex justify-between text-sm mb-1"><span class="text-slate-300">Traefik Ingress</span><span class="text-slate-500 font-mono text-xs">Advanced</span></div>
                                <div class="progress-bar"><div class="progress-fill" style="width:85%"></div></div>
                            </div>
                            <div>
                                <div class="flex justify-between text-sm mb-1"><span class="text-slate-300">Cert-Manager / TLS</span><span class="text-slate-500 font-mono text-xs">Advanced</span></div>
                                <div class="progress-bar"><div class="progress-fill" style="width:85%"></div></div>
                            </div>
                            <div>
                                <div class="flex justify-between text-sm mb-1"><span class="text-slate-300">DNS / AdGuard</span><span class="text-slate-500 font-mono text-xs">Proficient</span></div>
                                <div class="progress-bar"><div class="progress-fill" style="width:78%"></div></div>
                            </div>
                        </div>
                    </div>
    
                    <!-- Observability -->
                    <div class="glass-card p-6 rounded-2xl">
                        <div class="flex items-center gap-3 mb-5">
                            <div class="w-10 h-10 rounded-lg bg-rose-500/15 flex items-center justify-center">
                                <i class="fa-solid fa-chart-line text-rose-400"></i>
                            </div>
                            <h3 class="font-semibold text-white">Observability</h3>
                        </div>
                        <div class="space-y-3">
                            <div>
                                <div class="flex justify-between text-sm mb-1"><span class="text-slate-300">Prometheus</span><span class="text-slate-500 font-mono text-xs">Proficient</span></div>
                                <div class="progress-bar"><div class="progress-fill" style="width:78%"></div></div>
                            </div>
                            <div>
                                <div class="flex justify-between text-sm mb-1"><span class="text-slate-300">Grafana</span><span class="text-slate-500 font-mono text-xs">Proficient</span></div>
                                <div class="progress-bar"><div class="progress-fill" style="width:75%"></div></div>
                            </div>
                            <div>
                                <div class="flex justify-between text-sm mb-1"><span class="text-slate-300">Alertmanager</span><span class="text-slate-500 font-mono text-xs">Intermediate</span></div>
                                <div class="progress-bar"><div class="progress-fill" style="width:62%"></div></div>
                            </div>
                            <div>
                                <div class="flex justify-between text-sm mb-1"><span class="text-slate-300">kube-prometheus-stack</span><span class="text-slate-500 font-mono text-xs">Proficient</span></div>
                                <div class="progress-bar"><div class="progress-fill" style="width:78%"></div></div>
                            </div>
                        </div>
                    </div>
    
                    <!-- AI & ML Ops -->
                    <div class="glass-card p-6 rounded-2xl">
                        <div class="flex items-center gap-3 mb-5">
                            <div class="w-10 h-10 rounded-lg bg-amber-500/15 flex items-center justify-center">
                                <i class="fa-solid fa-brain text-amber-400"></i>
                            </div>
                            <h3 class="font-semibold text-white">AI / Local Inference</h3>
                        </div>
