---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: presentation
  namespace: apps
  labels:
    app: presentation
spec:
  replicas: 1
  selector:
    matchLabels:
      app: presentation
  template:
    metadata:
      labels:
        app: presentation
    spec:
      containers:
      - name: nginx
        image: nginx:alpine
        ports:
        - containerPort: 80
        volumeMounts:
        - name: html-volume
          mountPath: /usr/share/nginx/html
      volumes:
      - name: html-volume
        configMap:
          name: presentation-html
---
apiVersion: v1
kind: Service
metadata:
  name: presentation
  namespace: apps
spec:
  selector:
    app: presentation
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: presentation
  namespace: apps
  annotations:
    kubernetes.io/ingress.class: traefik
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  tls:
  - hosts:
    - portfolio.a-tishbek.info
    secretName: portfolio-tls
  rules:
  - host: portfolio.a-tishbek.info
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: presentation
            port:
              number: 80
