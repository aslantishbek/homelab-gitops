apiVersion: apps/v1
kind: Deployment
metadata:
  name: ollama
  namespace: ai
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ollama
  template:
    metadata:
      labels:
        app: ollama
    spec:
      containers:
        - name: ollama
          image: ollama/ollama:rocm
          env:
            - name: HSA_OVERRIDE_GFX_VERSION
              value: "11.0.0"
            - name: OLLAMA_HOST
              value: "0.0.0.0"
          ports:
            - containerPort: 11434
              name: http
          securityContext:
            privileged: true
          volumeMounts:
            - name: data
              mountPath: /root/.ollama
            - name: kfd
              mountPath: /dev/kfd
            - name: dri
              mountPath: /dev/dri
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: ollama-data
        - name: kfd
          hostPath:
            path: /dev/kfd
        - name: dri
          hostPath:
            path: /dev/dri
