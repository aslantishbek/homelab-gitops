apiVersion: apps/v1
kind: Deployment
metadata:
  name: samba
  namespace: apps
spec:
  replicas: 1
  selector:
    matchLabels:
      app: samba
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: samba
    spec:
      containers:
        - name: samba
          image: ghcr.io/servercontainers/samba:latest@sha256:155d384c4e3948f84ab8126647877bb409d7882a04173952bddf78fa547e1f9b
          env:
            - name: SAMBA_GLOBAL_CONFIG_netbios_SPACE_name
              value: "HOMELAB"
            - name: SAMBA_GLOBAL_CONFIG_server_SPACE_string
              value: "homelab"
            - name: SAMBA_GLOBAL_CONFIG_workgroup
              value: "WORKGROUP"
            - name: SAMBA_GLOBAL_CONFIG_server_SPACE_min_SPACE_protocol
              value: "SMB2"
            - name: SAMBA_GLOBAL_CONFIG_disable_SPACE_netbios
              value: "no"
            - name: SAMBA_VOLUME_CONFIG_media
              value: "[media]; path=/media; valid users = aslantishbek; read only = no; browseable = yes; create mask = 0664; directory mask = 0775"
            - name: ACCOUNT_aslantishbek
              valueFrom:
                secretKeyRef:
                  name: samba-credentials
                  key: aslantishbek-password
            - name: UID_aslantishbek
              value: "1000"
            - name: SAMBA_VOLUME_CONFIG_models
              value: "[models]; path=/models-host; valid users = aslantishbek; read only = no; browseable = yes; create mask = 0664; directory mask = 0775"
            - name: SAMBA_VOLUME_CONFIG_root
              value: "[root]; path=/host-root; valid users = aslantishbek; read only = no; browseable = yes; create mask = 0664; directory mask = 0775; force user = root"
          ports:
            - containerPort: 445
              name: smb
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 256Mi
          readinessProbe:
            tcpSocket:
              port: 445
            initialDelaySeconds: 10
            periodSeconds: 15
          volumeMounts:
            - name: media
              mountPath: /media
            - name: models
              mountPath: /models-host
            - name: rootfs
              mountPath: /host-root
          securityContext:
            capabilities:
              add: ["CAP_NET_BIND_SERVICE"]
      volumes:
        - name: media
          hostPath:
            path: /home/media
        - name: models
          hostPath:
            path: /home/media/comfyui-models
        - name: rootfs
          hostPath:
            path: /
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
