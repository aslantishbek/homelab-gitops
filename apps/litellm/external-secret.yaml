apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: litellm-api-keys
  namespace: ai
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vaultwarden-backend
    kind: ClusterSecretStore
  target:
    name: litellm-api-keys
    creationPolicy: Owner
  data:
    - secretKey: ANTHROPIC_API_KEY
      remoteRef:
        key: anthropic-api-key   # TODO: set this Bitwarden item name
    - secretKey: GEMINI_API_KEY
      remoteRef:
        key: gemini-api-key      # TODO: set this Bitwarden item name
