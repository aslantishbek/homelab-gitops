apiVersion: apps/v1
kind: Deployment
metadata:
  name: open-webui
  namespace: apps
spec:
  replicas: 1
  selector:
    matchLabels:
      app: open-webui
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: open-webui
    spec:
      containers:
        - name: open-webui
          image: ghcr.io/open-webui/open-webui:main
          env:
            - name: OLLAMA_BASE_URL
              value: "http://192.168.68.58:11434"
            - name: OPENAI_API_BASE_URL
              value: "http://litellm.ai.svc.cluster.local:4000/v1"
            - name: OPENAI_API_KEY
              value: "sk-placeholder"
          ports:
            - containerPort: 8080
              name: http
          volumeMounts:
            - name: data
              mountPath: /app/backend/data
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: open-webui-data
