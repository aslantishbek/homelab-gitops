apiVersion: apps/v1
kind: Deployment
metadata:
  name: comfyui
  namespace: ai
spec:
  replicas: 1
  selector:
    matchLabels:
      app: comfyui
  template:
    metadata:
      labels:
        app: comfyui
    spec:
      containers:
        - name: comfyui
          image: rocm/pytorch:latest
          env:
            - name: HSA_OVERRIDE_GFX_VERSION
              value: "11.0.0"
          command: ["/bin/bash", "-c"]
          args:
            - |
              mkdir -p /root/comfyui
              cd /root/comfyui
              if [ ! -d "ComfyUI" ]; then
                git clone https://github.com/comfyanonymous/ComfyUI.git
                cd ComfyUI && pip install -r requirements.txt
              else
                cd ComfyUI
              fi
              # Install ComfyUI-Manager
              mkdir -p custom_nodes
              if [ ! -d "custom_nodes/ComfyUI-Manager" ]; then
                git clone https://github.com/ltdrdata/ComfyUI-Manager.git custom_nodes/ComfyUI-Manager
              fi
              # Install Wan AI (WanVideo)
              if [ ! -d "custom_nodes/ComfyUI-WanVideo" ]; then
                git clone https://github.com/kijai/ComfyUI-WanVideo.git custom_nodes/ComfyUI-WanVideo
                pip install -r custom_nodes/ComfyUI-WanVideo/requirements.txt
              fi
              python3 main.py --listen 0.0.0.0 --port 8188
          ports:
            - containerPort: 8188
              name: http
          securityContext:
            privileged: true
          volumeMounts:
            - name: data
              mountPath: /root/comfyui
            - name: kfd
              mountPath: /dev/kfd
            - name: dri
              mountPath: /dev/dri
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: comfyui-data
        - name: kfd
          hostPath:
            path: /dev/kfd
        - name: dri
          hostPath:
            path: /dev/dri
