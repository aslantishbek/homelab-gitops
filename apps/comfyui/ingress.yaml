apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: comfyui
  namespace: ai
  annotations:
    kubernetes.io/ingress.class: traefik
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  rules:
    - host: comfy.a-tishbek.info
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: comfyui
                port:
                  number: 8188
  tls:
    - hosts:
        - comfy.a-tishbek.info
      secretName: comfyui-tls
