apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: grafana-admin-creds
  namespace: monitoring
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vaultwarden-backend # Replace with your actual ClusterSecretStore/SecretStore name
    kind: ClusterSecretStore
  target:
    name: grafana-admin-creds
    creationPolicy: Owner
  data:
    - secretKey: admin-user
      remoteRef:
        key: 9abe3a7d-cc38-4fe7-9223-d9270e08c32e # The ID or exact name of your Vaultwarden item
        property: username
    - secretKey: admin-password
      remoteRef:
        key: grafana-admin-creds
        property: password
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kube-prometheus-stack
  namespace: monitoring
spec:
  dependsOn:
    - name: loki-stack
      namespace: monitoring
  interval: 30m
  chart:
    spec:
      chart: kube-prometheus-stack
      version: "58.2.0"
      sourceRef:
        kind: HelmRepository
        name: prometheus-community
        namespace: flux-system
      interval: 12h
  values:
    # Grafana configuration
    grafana:
      admin:
        existingSecret: "grafana-admin-creds"
        userKey: "admin-user"
        passwordKey: "admin-password"
      ingress:
        enabled: true
        ingressClassName: "traefik"
        annotations:
          cert-manager.io/cluster-issuer: "letsencrypt-prod"
        hosts:
          - "grafana.a-tishbek.info"
        path: /
        pathType: Prefix
        tls:
          - secretName: grafana-tls
            hosts:
              - "grafana.a-tishbek.info"
      # Add Loki as a datasource
      additionalDataSources:
        - name: Loki
          type: loki
          url: http://loki-stack.monitoring.svc.cluster.local:3100
          access: proxy
          isDefault: false
          jsonData:
            maxLines: 1000
      persistence:
        enabled: true
        storageClassName: "local-path"
        size: 10Gi

    # Prometheus configuration
    prometheus:
      prometheusSpec:
        storageSpec:
          volumeClaimTemplate:
            spec:
              storageClassName: "local-path"
              accessModes: ["ReadWriteOnce"]
              resources:
                requests:
                  storage: 50Gi
        retention: 15d