apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: loki-stack
  namespace: monitoring
spec:
  interval: 30m
  chart:
    spec:
      chart: loki-stack
      version: "2.9.10"
      sourceRef:
        kind: HelmRepository
        name: grafana
        namespace: flux-system
      interval: 12h
  values:
    # Disable the Grafana instance included with loki-stack
    # as we are using the one from kube-prometheus-stack.
    grafana:
      enabled: false

    # Configure Loki persistence.
    loki:
      persistence:
        enabled: true
        storageClassName: "local-path"
        size: 20Gi