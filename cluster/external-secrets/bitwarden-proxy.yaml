apiVersion: apps/v1
kind: Deployment
metadata:
  name: bitwarden-proxy
  namespace: external-secrets
spec:
  replicas: 1
  selector:
    matchLabels:
      app: bitwarden-proxy
  template:
    metadata:
      labels:
        app: bitwarden-proxy
    spec:
      containers:
        - name: proxy
          image: node:20-alpine
          command: ["/bin/sh", "-c"]
          args:
            - |
              echo "Installing official Bitwarden CLI..."
              npm install -g @bitwarden/cli
              bw config server "$BW_HOST"
              export BW_SESSION=$(bw login "$BW_USER" "$BW_PASSWORD" --raw)
              echo "Initial login successful. Starting server and background sync..."
              # Background process to sync the vault every hour
              (while true; do sleep 3600; echo "Syncing Bitwarden vault..."; bw sync; done) &
              # Start the server in the foreground
              bw serve --hostname 0.0.0.0 --port 8087
          env:
            - name: BW_HOST
              value: "https://vault.a-tishbek.info"
            - name: BW_USER
              valueFrom:
                secretKeyRef:
                  name: vaultwarden-credentials
                  key: username
            - name: BW_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: vaultwarden-credentials
                  key: password
          ports:
            - containerPort: 8087
---
apiVersion: v1
kind: Service
metadata:
  name: bitwarden-proxy
  namespace: external-secrets
spec:
  selector:
    app: bitwarden-proxy
  ports:
    - port: 8087
      targetPort: 8087